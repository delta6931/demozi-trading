<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSV Parser</title>
</head>

<body>
    <h1>Wix CSV Parser</h1>
    <input type="file" id="csvFile" accept=".csv">
    <button id="processBtn">Process CSV</button>
    <p id="status">Waiting for file...</p>
    <textarea id="output" style="width: 100%; height: 400px; display: none;"></textarea>

    <script>
        document.getElementById('processBtn').addEventListener('click', () => {
            const fileInput = document.getElementById('csvFile');
            const file = fileInput.files[0];
            const statusEl = document.getElementById('status');
            const outputEl = document.getElementById('output');

            if (!file) {
                statusEl.innerText = "Please select the wix_products.csv file.";
                return;
            }

            statusEl.innerText = "Processing...";

            const reader = new FileReader();
            reader.onload = function (e) {
                const text = e.target.result;
                const lines = text.split('\n');

                const products = [];
                let headers = [];

                // Parse headers
                if (lines.length > 0) {
                    headers = lines[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h => h.trim());
                }

                // Find column indices
                const typeIdx = headers.indexOf('fieldType');
                const nameIdx = headers.indexOf('name');
                const descIdx = headers.indexOf('description');
                const imgIdx = headers.indexOf('productImageUrl');
                const brandIdx = headers.indexOf('brand');

                console.log("Headers identified:", { typeIdx, nameIdx, descIdx, imgIdx, brandIdx });

                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;

                    const cells = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

                    if (cells.length <= Math.max(typeIdx, nameIdx)) continue;

                    const fieldType = cells[typeIdx];
                    let name = cells[nameIdx];
                    let desc = descIdx !== -1 && cells.length > descIdx ? cells[descIdx] : '';
                    let imageUrl = imgIdx !== -1 && cells.length > imgIdx ? cells[imgIdx] : '';
                    let brand = brandIdx !== -1 && cells.length > brandIdx ? cells[brandIdx] : '';

                    if (name) name = name.replace(/^"|"$/g, '').trim();
                    if (desc) desc = desc.replace(/^"|"$/g, '').trim();
                    if (imageUrl) imageUrl = imageUrl.replace(/^"|"$/g, '').trim();
                    if (brand) brand = brand.replace(/^"|"$/g, '').trim();

                    if (name && fieldType === 'Product') {
                        products.push({
                            name: name,
                            description: desc,
                            imageUrl: imageUrl,
                            brand: brand
                        });
                    }
                }

                statusEl.innerText = `Successfully parsed ${products.length} products!`;

                // Generate output JS
                const jsOutput = `// Extracted and processed from Wix CSV
const parsedWixProducts = ${JSON.stringify(products, null, 2)};
`;

                outputEl.value = jsOutput;
                outputEl.style.display = 'block';

                // Expose to window for the subagent to grab easily
                window.parsedProductsData = jsOutput;
                window.parsedCount = products.length;
            };

            reader.onerror = function () {
                statusEl.innerText = "Error reading file.";
            };

            reader.readAsText(file);
        });
    </script>
</body>

</html>
